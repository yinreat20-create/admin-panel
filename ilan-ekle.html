<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni İlan Ekle - Silopi Sahibinden</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-location-dot"></i>
                <h2>SİLOPİ <span>SAHİBİNDEN</span></h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Ana Sayfa</a></li>
                <li><a href="ilanlar.html"><i class="fa-solid fa-list"></i> İlanlar</a></li>
                <li class="active"><a href="ilan-ekle.html"><i class="fa-solid fa-plus-circle"></i> Yeni İlan Ekle</a></li>
                <li><a href="kullanicilar.html"><i class="fa-solid fa-users"></i> Kullanıcılar</a></li>
                <li><a href="mesajlar.html"><i class="fa-solid fa-envelope"></i> Mesajlar</a></li>
                <li><a href="favoriler.html"><i class="fa-solid fa-heart"></i> Favoriler</a></li>
                <li><a href="raporlar.html"><i class="fa-solid fa-chart-line"></i> Raporlar</a></li>
                <li><a href="ayarlar.html"><i class="fa-solid fa-gear"></i> Site Ayarları</a></li>
                <li class="logout"><a href="#" id="logoutBtn"><i class="fa-solid fa-sign-out-alt"></i> Çıkış Yap</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <nav class="navbar">
                <div class="nav-left">
                    <button id="menuToggle"><i class="fa-solid fa-bars"></i></button>
                    <h2 class="page-title">Yeni İlan Ekle</h2>
                </div>
                <div class="nav-right">
                    <div class="profile-menu">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=0f172a&color=fff" alt="Admin">
                        <span>Yönetici</span>
                    </div>
                </div>
            </nav>

            <div class="content-wrapper">
                <div class="chart-card" style="max-width: 800px; margin: 0 auto;">
                    <form id="ilanForm">
                        <div class="form-group">
                            <label>İlan Başlığı</label>
                            <input type="text" class="form-control" placeholder="Örn: Sahibinden Satılık 3+1 Daire" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;">
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                            <div class="form-group">
                                <label>Fiyat (₺)</label>
                                <input type="number" class="form-control" placeholder="Örn: 1500000" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;">
                            </div>
                            <div class="form-group">
                                <label>Kategori</label>
                                <select class="form-control" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;">
                                    <option>Emlak</option>
                                    <option>Vasıta</option>
                                    <option>İkinci El ve Sıfır Alışveriş</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group" style="margin-bottom: 20px;">
                            <label>Fotoğraflar</label>
                            <div class="photo-upload-area" onclick="document.getElementById('photoInput').click()">
                                <i class="fa-solid fa-cloud-arrow-up" style="font-size: 3rem; color: var(--primary);"></i>
                                <h3>Fotoğraf Yüklemek İçin Tıklayın</h3>
                                <p>En fazla 20 adet (Sadece cihazdan yükleme)</p>
                                <input type="file" id="photoInput" multiple accept="image/*" style="display: none;">
                            </div>
                            <div id="previewGrid" class="preview-grid"></div>
                        </div>

                        <div class="form-group" style="margin-bottom: 20px;">
                            <label>İlan Açıklaması</label>
                            <textarea rows="5" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;"></textarea>
                        </div>

                        <button type="button" class="btn-primary">İlanı Kaydet ve Yayınla</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
